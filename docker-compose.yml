services:
  caddy:
    image: caddy
    command: caddy reverse-proxy --from https://damctf.xyz --to http://app:8000 --internal-certs
    ports:
      - 80:80
      - 443:443

  db:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rng
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: pg_isready -U postgres -d rng
      interval: 5s
      timeout: 3s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rng

      CTFTIME_OAUTH_CLIENTID: x
      CTFTIME_OAUTH_CLIENTSECRET: x
    ports:
      - 8000:8000
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
