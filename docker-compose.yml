services:

  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rng

  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rng

      CTFTIME_OAUTH_CLIENTID: x
      CTFTIME_OAUTH_CLIENTSECRET: x
    ports:
      - 8000:8000
    depends_on:
      - migrations

volumes:
  caddy_data:
